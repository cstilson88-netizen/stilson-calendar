<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Calendar — May–August 2026</title>
<style>
  :root {
    --chuck: #2563eb;
    --chuck-bg: #dbeafe;
    --chuck-text: #1e3a8a;
    --blake: #16a34a;
    --blake-bg: #dcfce7;
    --blake-text: #14532d;
    --abby: #d97706;
    --abby-bg: #fef3c7;
    --abby-text: #78350f;
    --celeste: #9333ea;
    --celeste-bg: #f3e8ff;
    --celeste-text: #581c87;
    --border: #e2e8f0;
    --header-bg: #1e293b;
    --day-bg: #ffffff;
    --day-num: #64748b;
    --other-month: #f8fafc;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: #f1f5f9; color: #1e293b; min-height: 100vh; }

  .app-header {
    background: var(--header-bg); color: white;
    padding: 1rem 1.5rem; display: flex; align-items: center;
    justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  .app-header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: .02em; }
  .legend { display: flex; gap: .75rem; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: .35rem; font-size: .8rem; color: #cbd5e1; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .header-right { display: flex; align-items: center; gap: .75rem; }

  .sync-status {
    font-size: .75rem; color: #94a3b8; display: flex; align-items: center; gap: .35rem;
  }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #94a3b8;
    transition: background .3s;
  }
  .sync-dot.synced { background: #22c55e; }
  .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
  .sync-dot.error { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .toolbar {
    display: flex; gap: .75rem; align-items: center; flex-wrap: wrap;
    padding: .75rem 1.5rem; background: white; border-bottom: 1px solid var(--border);
  }
  .toolbar label { font-size: .85rem; font-weight: 500; color: #475569; }
  .toolbar select, .toolbar input[type=text], .toolbar input[type=date] {
    padding: .35rem .6rem; border: 1px solid var(--border);
    border-radius: 6px; font-size: .85rem; color: #1e293b; background: white;
  }
  .btn {
    padding: .35rem .85rem; border-radius: 6px; font-size: .85rem;
    font-weight: 500; cursor: pointer; border: 1px solid var(--border);
    background: white; color: #1e293b; transition: background .15s;
  }
  .btn:hover { background: #f1f5f9; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: #2563eb; color: white; border-color: #2563eb; }
  .btn-primary:hover:not(:disabled) { background: #1d4ed8; }

  .months-nav {
    display: flex; gap: .5rem; padding: .75rem 1.5rem;
    background: white; border-bottom: 1px solid var(--border);
  }
  .month-tab {
    padding: .4rem 1.1rem; border-radius: 20px; font-size: .875rem;
    font-weight: 500; cursor: pointer; border: 1.5px solid transparent;
    transition: all .15s; color: #64748b; background: none;
  }
  .month-tab:hover { border-color: var(--border); background: #f8fafc; color: #1e293b; }
  .month-tab.active { background: #1e293b; color: white; border-color: #1e293b; }

  .calendar-wrap { padding: 1.5rem; }

  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; background: var(--border); gap: 1px;
  }
  .dow-header {
    background: #334155; color: #cbd5e1; text-align: center;
    padding: .6rem 0; font-size: .78rem; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
  }
  .day-cell {
    background: var(--day-bg); min-height: 120px;
    padding: .4rem .5rem .5rem; display: flex; flex-direction: column;
    gap: 2px; position: relative;
  }
  .day-cell.other-month { background: var(--other-month); }
  .day-cell.other-month .day-num { color: #c9d4e0; }
  .day-num {
    font-size: .8rem; font-weight: 600; color: var(--day-num);
    margin-bottom: 2px; align-self: flex-start;
    width: 22px; height: 22px; line-height: 22px;
    text-align: center; border-radius: 50%;
  }
  .day-cell.today .day-num { background: #f59e0b; color: white; }

  .event-pill {
    font-size: .72rem; font-weight: 500; padding: 1px 6px; border-radius: 4px;
    line-height: 1.6; cursor: default; display: flex; align-items: center;
    justify-content: space-between; gap: 4px; overflow: hidden;
  }
  .event-pill .del-btn {
    display: none; background: none; border: none; cursor: pointer;
    font-size: 10px; line-height: 1; padding: 0 1px; color: inherit; opacity: .7;
  }
  .event-pill:hover .del-btn { display: inline; }
  .event-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

  .chuck-event   { background: var(--chuck-bg);   color: var(--chuck-text);   }
  .blake-event   { background: var(--blake-bg);   color: var(--blake-text);   }
  .abby-event    { background: var(--abby-bg);    color: var(--abby-text);    }
  .celeste-event { background: var(--celeste-bg); color: var(--celeste-text); }

  .add-btn {
    font-size: .7rem; color: #94a3b8; background: none; border: none;
    cursor: pointer; text-align: left; margin-top: auto; padding: 1px 0;
  }
  .add-btn:hover { color: #2563eb; }

  .loading-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; color: white; font-size: 1rem; gap: .75rem;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.3);
    border-top-color: white; border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(15,23,42,.45); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: white; border-radius: 12px; padding: 1.5rem;
    width: 340px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,.2);
  }
  .modal h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
  .modal label { display: block; font-size: .83rem; font-weight: 500; color: #475569; margin-bottom: .25rem; margin-top: .75rem; }
  .modal input, .modal select {
    width: 100%; padding: .45rem .65rem; border: 1px solid var(--border);
    border-radius: 6px; font-size: .875rem; font-family: var(--font); color: #1e293b;
  }
  .modal-btns { display: flex; justify-content: flex-end; gap: .5rem; margin-top: 1.25rem; }

  @media print {
    @page { size: landscape; margin: .5in; }
    body { background: white; }
    .app-header, .toolbar, .months-nav, .add-btn, .del-btn,
    .modal-backdrop, .loading-overlay { display: none !important; }
    .calendar-wrap { padding: 0; }
    .month-section { page-break-after: always; break-after: page; }
    .month-section:last-child { page-break-after: avoid; break-after: avoid; }
    .month-print-header { display: flex !important; align-items: baseline; justify-content: space-between; margin-bottom: .5rem; }
    .month-print-title { font-size: 1.4rem; font-weight: 700; color: #1e293b; }
    .print-legend { display: flex !important; gap: 1rem; }
    .print-legend-item { font-size: .75rem; display: flex; align-items: center; gap: .3rem; }
    .print-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .print-dot.chuck   { background: var(--chuck); }
    .print-dot.blake   { background: var(--blake); }
    .print-dot.abby    { background: var(--abby); }
    .print-dot.celeste { background: var(--celeste); }
    .cal-grid { border: 1px solid #94a3b8; border-radius: 0; gap: .5px; background: #94a3b8; }
    .dow-header { background: #334155; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-size: .7rem; padding: .4rem 0; }
    .day-cell { min-height: 90px; padding: .3rem .35rem .35rem; }
    .day-num { font-size: .75rem; }
    .event-pill { font-size: .65rem; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .chuck-event, .blake-event, .abby-event, .celeste-event { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .day-cell.today .day-num { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
  @media screen {
    .month-print-header { display: none; }
    .print-legend { display: none; }
    .month-title-screen { font-size: 1.4rem; font-weight: 700; margin-bottom: .75rem; color: #1e293b; }
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>🗓 Family Calendar — 2026</h1>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:var(--chuck)"></span>Chuck</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--blake)"></span>Blake</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--abby)"></span>Abby</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--celeste)"></span>Celeste</span>
  </div>
  <div class="header-right">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Loading…</span>
    </div>
    <button class="btn" onclick="loadEvents()" title="Refresh events">↻ Refresh</button>
    <button class="btn btn-primary" onclick="window.print()">🖨 Print</button>
  </div>
</div>

<div class="months-nav" id="months-nav"></div>

<div class="toolbar">
  <label>Add event:</label>
  <select id="ev-person">
    <option value="chuck">Chuck</option>
    <option value="blake">Blake</option>
    <option value="abby">Abby</option>
    <option value="celeste">Celeste</option>
  </select>
  <input type="text" id="ev-text" placeholder="Event title…" style="width:180px">
  <input type="date" id="ev-date" style="width:145px">
  <button class="btn btn-primary" id="add-btn" onclick="addEventFromToolbar()">+ Add</button>
</div>

<div class="calendar-wrap" id="calendar-wrap"></div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2 id="modal-title">Add Event</h2>
    <label>Person</label>
    <select id="m-person">
      <option value="chuck">Chuck</option>
      <option value="blake">Blake</option>
      <option value="abby">Abby</option>
      <option value="celeste">Celeste</option>
    </select>
    <label>Event Title</label>
    <input type="text" id="m-text" placeholder="Soccer game, dentist…">
    <label>Date</label>
    <input type="date" id="m-date" readonly style="background:#f8fafc">
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveModal()">Save Event</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw0xs49oUuwZ-Y1pid7NMeH_ZkGafeeTqxk23mS66_qpByxb6ClbmSzSD-lNnJ3Xl7zBw/exec';

const MONTHS = [
  { year: 2026, month: 4, name: 'May 2026' },
  { year: 2026, month: 5, name: 'June 2026' },
  { year: 2026, month: 6, name: 'July 2026' },
  { year: 2026, month: 7, name: 'August 2026' },
];
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const PEOPLE = { chuck:'Chuck', blake:'Blake', abby:'Abby', celeste:'Celeste' };

let events = [];
let activeMonth = 0;
let modalDate = null;

function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

function callScript(params) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    const timeout = setTimeout(() => {
      delete window[cb];
      reject(new Error('timeout'));
    }, 15000);
    window[cb] = (data) => {
      clearTimeout(timeout);
      delete window[cb];
      resolve(data);
    };
    const entries = Object.entries(Object.assign({}, params, {callback: cb}));
    const qs = entries.map(function(kv){ return kv[0] + '=' + encodeURIComponent(kv[1]); }).join('&');
    const script = document.createElement('script');
    script.src = SCRIPT_URL + '?' + qs;
    script.onerror = function() {};
    document.head.appendChild(script);
    setTimeout(function() {
      if (script.parentNode) script.parentNode.removeChild(script);
    }, 20000);
  });
}

async function loadEvents() {
  setSyncStatus('syncing', 'Loading…');
  try {
    const data = await callScript({});
    events = Array.isArray(data) ? data.filter(r => r.id && r.date && r.person && r.text) : [];
    setSyncStatus('synced', 'Synced');
    render();
  } catch(e) {
    setSyncStatus('error', 'Sync failed');
    console.error('loadEvents error:', e);
  }
}

async function postEvent(payload) {
  return callScript({ payload: JSON.stringify(payload) });
}


function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function eventsForDate(dateStr) {
  return events.filter(e => e.date === dateStr);
}

function buildCalGrid(year, month) {
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  let html = '<div class="cal-grid">';
  DOW.forEach(d => html += `<div class="dow-header">${d}</div>`);

  let cells = [];
  for (let i=0; i<firstDay; i++) cells.push({ day: daysInPrev-firstDay+1+i, other:true, m:month-1, y:month===0?year-1:year });
  for (let d=1; d<=daysInMonth; d++) cells.push({ day:d, other:false, m:month, y:year });
  while (cells.length % 7 !== 0) {
    const extra = cells.length - daysInMonth - firstDay + 1;
    cells.push({ day:extra, other:true, m:month+1, y:month===11?year+1:year });
  }

  cells.forEach(c => {
    const cm = c.other ? c.m : month;
    const cy = c.other ? c.y : year;
    const dateStr = `${cy}-${String(cm+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const cls = (c.other ? 'day-cell other-month' : 'day-cell') + (isToday ? ' today' : '');
    const evs = eventsForDate(dateStr);
    html += `<div class="${cls}" data-date="${dateStr}">`;
    html += `<span class="day-num">${c.day}</span>`;
    evs.forEach(ev => {
      html += `<div class="event-pill ${ev.person}-event">
        <span class="event-text" title="${PEOPLE[ev.person]||ev.person}: ${ev.text}">${ev.text}</span>
        <button class="del-btn" onclick="deleteEvent('${ev.id}',event)" title="Delete">✕</button>
      </div>`;
    });
    if (!c.other) html += `<button class="add-btn" onclick="openModal('${dateStr}')">+ add</button>`;
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function render() {
  const nav = document.getElementById('months-nav');
  nav.innerHTML = MONTHS.map((m,i) =>
    `<button class="month-tab ${i===activeMonth?'active':''}" onclick="setMonth(${i})">${m.name}</button>`
  ).join('');

  const wrap = document.getElementById('calendar-wrap');
  wrap.innerHTML = MONTHS.map((m, i) => {
    const grid = buildCalGrid(m.year, m.month);
    const printLeg = `<div class="month-print-header">
      <span class="month-print-title">${m.name}</span>
      <div class="print-legend">
        ${Object.entries(PEOPLE).map(([k,v]) => `<span class="print-legend-item"><span class="print-dot ${k}"></span>${v}</span>`).join('')}
      </div>
    </div>`;
    const screenTitle = `<div class="month-title-screen">${m.name}</div>`;
    return `<div class="month-section" id="month-${i}" style="display:${i===activeMonth?'block':'none'}">${printLeg}${screenTitle}${grid}</div>`;
  }).join('');
}

function setMonth(i) { activeMonth = i; render(); }

function openModal(dateStr) {
  modalDate = dateStr;
  document.getElementById('m-date').value = dateStr;
  document.getElementById('m-text').value = '';
  document.getElementById('modal-title').textContent = 'Add Event — ' + formatDate(dateStr);
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('m-text').focus(), 50);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function saveModal() {
  const text = document.getElementById('m-text').value.trim();
  if (!text) { alert('Please enter an event title.'); return; }
  const person = document.getElementById('m-person').value;
  const saveBtn = document.getElementById('modal-save-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';
  setSyncStatus('syncing', 'Saving…');
  try {
    const ev = { id: genId(), date: modalDate, person, text };
    await postEvent(ev);
    events.push(ev);
    setSyncStatus('synced', 'Synced');
    closeModal();
    render();
  } catch(e) {
    setSyncStatus('error', 'Save failed');
    alert('Could not save event. Please try again.');
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Event';
  }
}

async function addEventFromToolbar() {
  const text = document.getElementById('ev-text').value.trim();
  const date = document.getElementById('ev-date').value;
  const person = document.getElementById('ev-person').value;
  if (!text || !date) { alert('Please fill in both date and event title.'); return; }
  const addBtn = document.getElementById('add-btn');
  addBtn.disabled = true;
  addBtn.textContent = 'Saving…';
  setSyncStatus('syncing', 'Saving…');
  try {
    const ev = { id: genId(), date, person, text };
    await postEvent(ev);
    events.push(ev);
    setSyncStatus('synced', 'Synced');
    document.getElementById('ev-text').value = '';
    const [y, m] = date.split('-').map(Number);
    const idx = MONTHS.findIndex(mo => mo.year===y && mo.month===m-1);
    if (idx >= 0) activeMonth = idx;
    render();
  } catch(e) {
    setSyncStatus('error', 'Save failed');
    alert('Could not save event. Please try again.');
  } finally {
    addBtn.disabled = false;
    addBtn.textContent = '+ Add';
  }
}

async function deleteEvent(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this event?')) return;
  setSyncStatus('syncing', 'Deleting…');
  try {
    await postEvent({ action: 'delete', id });
    events = events.filter(ev => String(ev.id) !== String(id));
    setSyncStatus('synced', 'Synced');
    render();
  } catch(e) {
    setSyncStatus('error', 'Delete failed');
    alert('Could not delete event. Please try again.');
  }
}

function formatDate(str) {
  const [y,m,d] = str.split('-');
  return new Date(y, m-1, d).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('m-text').addEventListener('keydown', e => { if (e.key==='Enter') saveModal(); });

window.addEventListener('beforeprint', () => {
  MONTHS.forEach((_,i) => document.getElementById('month-'+i).style.display = 'block');
});
window.addEventListener('afterprint', () => {
  MONTHS.forEach((_,i) => document.getElementById('month-'+i).style.display = i===activeMonth?'block':'none');
});

loadEvents();
</script>
</body>
</html>
